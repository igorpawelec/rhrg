# R CMD check across the platforms CRAN builds on, plus the cross-package
# check that the README's central claim rests on.
#
# The package compiles plain C with no Rcpp, so the matrix is about
# compiler and R-version drift rather than about dependencies: `stats` is
# the only import, and `terra` is a Suggests used solely by R/io.R.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

name: R-CMD-check

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest,  r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,  r: 'release'}
          # DESCRIPTION declares R (>= 3.6.0); oldrel-1 is the oldest R the
          # actions provide, and it is what catches an accidental use of a
          # newer base function.
          - {os: ubuntu-latest,  r: 'oldrel-1'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      # Without pandoc, `checking top-level files` NOTEs on README.md and
      # NEWS.md, which the package does ship.
      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          # --no-manual skips the PDF manual, which needs a LaTeX install.
          # Note what that costs: `checking PDF version of manual` is a real
          # CRAN check and it is NOT covered here, so run
          # `R CMD check --as-cran` locally with LaTeX present before
          # submitting. Everything else --as-cran does runs below.
          args: 'c("--no-manual", "--as-cran")'
          build_args: 'c("--no-manual")'
          # NOTEs do not fail the build: a first submission always NOTEs
          # "New submission", and there is no way to satisfy it.
          error-on: '"warning"'
          upload-snapshots: true

  cross-validation:
    # The README claims rHRG and pyHRG are identical pixel for pixel and
    # that this is checked rather than asserted. tools/ holds that check but
    # it needs Python, which CRAN machines do not have — so it never ran
    # anywhere automatically. GitHub runners do have Python, so it runs here.
    #
    # Scope, stated plainly: this covers the 60 synthetic scenes the
    # generator builds. It does not cover agreement on real canopy height
    # models, which is a separate open question.
    runs-on: ubuntu-latest
    name: identical to pyHRG

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          needs: check

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pyHRG
        # From git, not PyPI: pyHRG is not published yet. Switch this to
        # `pip install pyhrg` once it is, so the check runs against the
        # release rather than the tip of main.
        run: |
          python -m pip install --upgrade pip
          python -m pip install "pyhrg @ git+https://github.com/igorpawelec/pyhrg.git"

      - name: Install rHRG
        run: R CMD INSTALL .

      - name: Generate reference crowns from pyHRG
        run: python tools/generate_pyhrg_reference.py

      - name: Compare rHRG against them
        # cross_validate_against_pyhrg.R stops non-zero on any disagreement,
        # so a single differing pixel fails the job.
        run: Rscript tools/cross_validate_against_pyhrg.R
